name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: 9.15.0
  POSTGRES_USER: school
  POSTGRES_PASSWORD: compose-config-validation-only
  POSTGRES_DB: school

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Validate development compose
        run: docker compose -f docker/docker-compose.yml config

      - name: Validate production compose
        run: docker compose -f docker/docker-compose.prod.yml config

  deploy:
    name: Deploy to server
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "cd '${{ vars.DEPLOY_PATH }}' && \
             git pull --ff-only && \
             corepack enable && \
             pnpm install --frozen-lockfile && \
             pnpm build && \
             docker compose -f docker/docker-compose.prod.yml up -d"
